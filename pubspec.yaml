name: tarweeqa_erp
description: "Saif Warrior - Mini Mission Multiplayer Game"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.16.0
  audioplayers: ^6.0.0
  socket_io_client: ^3.0.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_remote_config: ^5.1.3
  firebase_crashlytics: ^4.1.3
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  intl: ^0.19.0
  crypto: ^3.0.5
  shared_preferences: ^2.3.2
  share_plus: ^10.1.2
  path_provider: ^2.1.4
  vibration: ^2.0.0
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
