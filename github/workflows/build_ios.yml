name: Build iOS IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Clean previous builds
        run: flutter clean

      - name: Create new ios folder
        run: flutter create --no-overwrite --platforms=ios --project-name tarweeqa_erp --org com.example .

      - name: Set correct Bundle ID
        run: |
          sed -i '' 's/com\.example\.tarweeqa[a-zA-Z]*/com.example.tarweeqa/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Set iOS deployment target to 13.0
        run: |
          if grep -q "^platform :ios" ios/Podfile; then
            sed -i '' "s/^platform :ios, '.*'/platform :ios, '13.0'/" ios/Podfile
          elif grep -q "# platform :ios" ios/Podfile; then
            sed -i '' "s/# platform :ios, '.*'/platform :ios, '13.0'/" ios/Podfile
          else
            echo "platform :ios, '13.0'" | cat - ios/Podfile > /tmp/podfile_new && mv /tmp/podfile_new ios/Podfile
          fi
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
          cat ios/Podfile | head -5

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: build/ios/iphoneos/Runner.app
