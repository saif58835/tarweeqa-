name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Clean previous builds
        run: flutter clean

      - name: Create new android folder
        run: |
          rm -rf android
          flutter create --platforms=android --project-name tarweeqa --org com.example .

      - name: Fix minSdkVersion (permanent fix)
        run: |
          FILE=""
          if [ -f "android/app/build.gradle.kts" ]; then
            FILE="android/app/build.gradle.kts"
          elif [ -f "android/app/build.gradle" ]; then
            FILE="android/app/build.gradle"
          fi

          echo "===== الملف المستخدم: $FILE ====="
          cat "$FILE"

          # يطابق minSdk = flutter.minSdkVersion بأي صيغة (مع أو بدون toInt، مسافات مختلفة)
          perl -0pi -e 's/minSdk\s*=\s*flutter\.minSdkVersion(\.toInt\(\))?/minSdk = 23/g' "$FILE"
          # يطابق الصيغة القديمة minSdkVersion flutter.minSdkVersion لو موجودة
          perl -0pi -e 's/minSdkVersion\s+flutter\.minSdkVersion/minSdkVersion 23/g' "$FILE"

          echo "===== بعد التعديل ====="
          cat "$FILE"

          if grep -qE "minSdk( )?= 23|minSdkVersion 23" "$FILE"; then
            echo "✅ تم التعديل بنجاح"
          else
            echo "❌ فشل التعديل!"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
