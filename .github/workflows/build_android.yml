name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Clean previous builds
        run: flutter clean

      - name: Create new android folder
        run: |
          rm -rf android
          flutter create --platforms=android --project-name tarweeqa --org com.example .

      - name: Fix minSdkVersion (permanent fix)
        run: |
          GRADLE_KTS="android/app/build.gradle.kts"
          GRADLE_GROOVY="android/app/build.gradle"

          echo "===== ظ‚ط¨ظ„ ط§ظ„طھط¹ط¯ظٹظ„ ====="
          cat "$GRADLE_KTS" 2>/dev/null || cat "$GRADLE_GROOVY" 2>/dev/null

          if [ -f "$GRADLE_KTS" ]; then
            perl -0pi -e 's/minSdk\s*=\s*flutter\.minSdkVersion(\.toInt\(\))?/minSdk = 23/g' "$GRADLE_KTS"
          fi
          if [ -f "$GRADLE_GROOVY" ]; then
            perl -0pi -e 's/minSdkVersion\s+flutter\.minSdkVersion/minSdkVersion 23/g' "$GRADLE_GROOVY"
          fi

          echo "===== ط¨ط¹ط¯ ط§ظ„طھط¹ط¯ظٹظ„ ====="
          cat "$GRADLE_KTS" 2>/dev/null || cat "$GRADLE_GROOVY" 2>/dev/null

          echo "===== ط§ظ„طھط­ظ‚ظ‚ ====="
          if [ -f "$GRADLE_KTS" ] && grep -q "minSdk = 23" "$GRADLE_KTS"; then
            echo "âœ… طھظ… ط§ظ„طھط¹ط¯ظٹظ„ ط¨ظ†ط¬ط§ط­"
          elif [ -f "$GRADLE_GROOVY" ] && grep -q "minSdkVersion 23" "$GRADLE_GROOVY"; then
            echo "âœ… طھظ… ط§ظ„طھط¹ط¯ظٹظ„ ط¨ظ†ط¬ط§ط­"
          else
            echo "â‌Œ ظپط´ظ„ ط§ظ„طھط¹ط¯ظٹظ„!"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
