name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Clean previous builds
        run: flutter clean

      - name: Create new android folder
        run: |
          rm -rf android
          flutter create --platforms=android --project-name tarweeqa --org com.example .

      - name: Fix minSdkVersion
        run: |
          FILE=""
          if [ -f "android/app/build.gradle.kts" ]; then FILE="android/app/build.gradle.kts"; fi
          if [ -f "android/app/build.gradle" ]; then FILE="android/app/build.gradle"; fi
          perl -0pi -e 's/minSdk\s*=\s*flutter\.minSdkVersion(\.toInt\(\))?/minSdk = 23/g' "$FILE"
          perl -0pi -e 's/minSdkVersion\s+flutter\.minSdkVersion/minSdkVersion 23/g' "$FILE"
          grep -E "minSdk( )?= 23|minSdkVersion 23" "$FILE" || (echo "❌ فشل minSdk" && exit 1)

      - name: Fix Kotlin version
        run: |
          SETTINGS="android/settings.gradle"
          [ -f "$SETTINGS" ] || SETTINGS="android/settings.gradle.kts"
          echo "===== قبل ====="
          cat "$SETTINGS"
          perl -0pi -e 's/(org\.jetbrains\.kotlin\.android"?\s+version\s+")[^"]+(")/${1}1.9.22${2}/g' "$SETTINGS"
          echo "===== بعد ====="
          cat "$SETTINGS"
          grep -q "kotlin.android\" version \"1.9.22\"" "$SETTINGS" && echo "✅ Kotlin تم تعديله" || echo "⚠️ راجع الصيغة"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
