name: Fix Android Once

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Clean previous builds
        run: flutter clean

      - name: Recreate android folder
        run: |
          rm -rf android
          flutter create --platforms=android --project-name tarweeqa --org com.example .

      - name: Fix minSdkVersion
        run: |
          GRADLE_KTS="android/app/build.gradle.kts"
          GRADLE_GROOVY="android/app/build.gradle"
          if [ -f "$GRADLE_KTS" ]; then
            perl -0pi -e 's/minSdk\s*=\s*flutter\.minSdkVersion(\.toInt\(\))?/minSdk = 23/g' "$GRADLE_KTS"
          fi
          if [ -f "$GRADLE_GROOVY" ]; then
            perl -0pi -e 's/minSdkVersion\s+flutter\.minSdkVersion/minSdkVersion 23/g' "$GRADLE_GROOVY"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK to verify it works
        run: flutter build apk --release

      - name: Commit android folder permanently
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android
          git commit -m "Fix: add corrected android folder with minSdk 23" || echo "ظ„ط§ ظٹظˆط¬ط¯ طھط؛ظٹظٹط±ط§طھ ظ„ط­ظپط¸ظ‡ط§"
          git push

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
